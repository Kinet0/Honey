# Docker Compose for development

version: '3.8'

services:
  postgresql:
    image: postgres:15-alpine
    container_name: honeypot-postgres-dev
    environment:
      POSTGRES_DB: honeypot_dashboard
      POSTGRES_USER: honeypot_user
      POSTGRES_PASSWORD: dev_password
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U honeypot_user -d honeypot_dashboard"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: honeypot-backend-dev
    environment:
      DATABASE_URL: postgresql+asyncpg://honeypot_user:dev_password@postgresql:5432/honeypot_dashboard
      DEBUG: "true"
      SECRET_KEY: dev-secret-key
      CORS_ORIGINS: "http://localhost:3000,http://localhost:3001"
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - logs_dev:/app/logs
    depends_on:
      postgresql:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: honeypot-frontend-dev
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000/api/v1
    depends_on:
      - backend
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: honeypot-redis-dev
    ports:
      - "6379:6379"
    restart: unless-stopped

volumes:
  postgres_data_dev:
  logs_dev:

networks:
  default:
    name: honeypot-network-dev
