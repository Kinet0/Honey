# Production Docker Compose for Honeypot Dashboard

version: '3.8'

services:
  postgresql:
    image: postgres:15-alpine
    container_name: honeypot-postgres
    environment:
      POSTGRES_DB: honeypot_dashboard
      POSTGRES_USER: honeypot_user
      POSTGRES_PASSWORD: ${DB_PASSWORD:-change_this_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U honeypot_user -d honeypot_dashboard"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: honeypot-backend
    environment:
      DATABASE_URL: postgresql+asyncpg://honeypot_user:${DB_PASSWORD:-change_this_password}@postgresql:5432/honeypot_dashboard
      DEBUG: "false"
      SECRET_KEY: ${SECRET_KEY:-change_this_key}
      CORS_ORIGINS: ${CORS_ORIGINS:-["http://localhost:3000"]}
    ports:
      - "8000:8000"
    depends_on:
      postgresql:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    container_name: honeypot-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: honeypot-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infrastructure/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infrastructure/ssl:/etc/nginx/ssl:ro
      - nginx_cache:/var/cache/nginx
    depends_on:
      - frontend
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
  logs:
  nginx_cache:

networks:
  default:
    name: honeypot-network
